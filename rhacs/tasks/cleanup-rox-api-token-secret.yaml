apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-rox-api-token-secret
spec:
  params:
    - name: rox-api-token-secret-name
      type: string
      description: Name of the ROX API token Secret to delete
  volumes:
    - name: shell-scripts
      configMap:
        name: rhacs-shell-scripts
        defaultMode: 0755
  steps:
    - image: registry.redhat.io/openshift4/ose-cli:latest
      name: delete-rox-api-token-secret
      command: ["/scripts/shell/delete-rox-api-token-secret.sh"]
      volumeMounts:
        - name: shell-scripts
          mountPath: /scripts/shell
          readOnly: true
      env:
        - name: ROX_API_TOKEN_SECRET_NAME
          value: $(params.rox-api-token-secret-name)
        - name: TASK_RUN_NAMESPACE
          value: $(context.taskRun.namespace)
      computeResources: {}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
