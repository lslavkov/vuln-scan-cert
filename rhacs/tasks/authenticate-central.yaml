apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: authenticate-central
spec:
  params:
    - name: rox-endpoint
      type: string
      description: Central UI Endpoint
    - name: ocm-token
      type: string
      description: Token generated when logging into OCM using Service Account credentials
    - name: rox-api-token-secret-name
      type: string
      description: |
        Name of the Secret (key rox_api_token) created for rhacs-image-scan.
        Must match the rox-api-token-auth workspace secretName on the PipelineRun.
  results:
    - name: rox-api-token
      type: string
      description: OIDC Token for ACS authentication, obtained after exchanching the OCM token
    - name: rox-api-token-secret-name
      type: string
      description: Name of the Secret containing the ROX API token
  stepTemplate:
    computeResources: {}
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
  steps:
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: install-roxctl
      command:
        - /scripts/install-roxctl.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      workingDir: $(workspaces.binaries.path)
    - image: image-registry.openshift-image-registry.svc:5000/default/python3-with-requests:latest
      name: authenticate-central
      results:
        - name: rox-api-token
          type: string
          description: OIDC Token for ACS authentication, obtained after exchanching the OCM token
      command:
        - python
        - /scripts/authenticate-central.py
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      env:
        - name: OCM_TOKEN
          value: $(params.ocm-token)
        - name: ROX_ENDPOINT
          value: $(params.rox-endpoint)
        - name: STEP_RESULTS_ROX_API_TOKEN_PATH
          value: $(step.results.rox-api-token.path)
        - name: RESULTS_ROX_API_TOKEN_PATH
          value: $(results.rox-api-token.path)
    - image: registry.redhat.io/ubi8/ubi-minimal
      name: test-rox-api-token
      command:
        - /scripts/test-rox-api-token.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      env:
        - name: ROX_API_TOKEN
          value: $(steps.authenticate-central.results.rox-api-token)
        - name: ROX_ENDPOINT
          value: $(params.rox-endpoint)
      workingDir: $(workspaces.binaries.path)
    - image: registry.redhat.io/openshift4/ose-cli:latest
      name: create-rox-api-token-secret
      results:
        - name: rox-api-token-secret-name
          type: string
      command:
        - /scripts/create-rox-api-token-secret.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      computeResources: {}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      env:
        - name: ROX_API_TOKEN
          value: $(steps.authenticate-central.results.rox-api-token)
        - name: ROX_API_TOKEN_SECRET_NAME
          value: $(params.rox-api-token-secret-name)
        - name: ROX_API_TOKEN_SECRET_NAME_PARAM
          value: $(params.rox-api-token-secret-name)
        - name: TASK_RUN_NAMESPACE
          value: $(context.taskRun.namespace)
        - name: STEP_RESULTS_ROX_API_TOKEN_SECRET_NAME_PATH
          value: $(step.results.rox-api-token-secret-name.path)
        - name: RESULTS_ROX_API_TOKEN_SECRET_NAME_PATH
          value: $(results.rox-api-token-secret-name.path)
  volumes:
    - name: scripts
      configMap:
        name: authenticate-central-scripts
        defaultMode: 0755
  workspaces:
    - description: |
        Binaries
      name: binaries
