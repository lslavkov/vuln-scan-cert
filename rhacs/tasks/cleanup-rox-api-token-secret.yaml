apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-rox-api-token-secret
spec:
  params:
    - name: rox-api-token-secret-name
      type: string
      description: Name of the ROX API token Secret to delete
  steps:
    - image: registry.redhat.io/openshift4/ose-cli:latest
      name: delete-rox-api-token-secret
      command:
        - /scripts/delete-rox-api-token-secret.sh
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      env:
        - name: ROX_API_TOKEN_SECRET_NAME
          value: $(params.rox-api-token-secret-name)
        - name: TASK_RUN_NAMESPACE
          value: $(context.taskRun.namespace)
      computeResources: {}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
  volumes:
    - name: scripts
      configMap:
        name: cleanup-rox-api-token-secret-scripts
        defaultMode: 0755
