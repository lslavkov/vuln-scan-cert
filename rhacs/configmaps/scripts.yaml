# ConfigMaps for all RHACS task scripts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: configure-central-scripts
data:
  configure-central.py: |
    #!/bin/env python
    from contextlib import suppress
    import os
    import requests

    ROX_ENDPOINT = os.getenv("ROX_ENDPOINT")
    headers = {"Authorization": "Bearer " + os.getenv("ROX_API_TOKEN")}
    payload = {
      "id": "",
      "name": "registry.redhat.io",
      "type": "rhel",
      "categories": [
        "REGISTRY"
      ],
      "docker": {
        "endpoint": "registry.redhat.io",
        "username": os.getenv("REGISTRY_REDHAT_USERNAME"),
        "password": os.getenv("REGISTRY_REDHAT_PASSWORD"),
        "insecure": False
      },
      "autogenerated": False,
      "clusterId": "",
      "skipTestIntegration": False,
      "source": None
    }

    response = requests.post(f"{ROX_ENDPOINT}/v1/imageintegrations", headers=headers, json=payload)
    return_code = response.status_code

    message = None
    with suppress(requests.exceptions.JSONDecodeError, AttributeError):
      # Ignore exceptions that can be raised if the response does not contain valid
      # JSON, or if it doesn't decode to a dictionary.
      message = response.json().get("message")

    if return_code != 200:
      if "already exists" in message:
        print("Central already configured")
      else:
        print("Failed to add image integration for registry.redhat.io")
        print(response.text)
        response.raise_for_status()
    else:
      print("Added image integration for registry.redhat.io")
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provision-central-scripts
data:
  install-ocm.sh: |
    #!/bin/sh
    # arch="$(uname -m | sed "s/x86_64//")"; arch="${arch:+-$arch}"
    curl -L -f -o ocm  https://github.com/openshift-online/ocm-cli/releases/download/v1.0.14/ocm-linux-amd64
    chmod +x ocm
    ./ocm version
  ocm-login.sh: |
    #!/bin/sh
    ./ocm login --client-id ${CLIENT_ID} --client-secret ${CLIENT_SECRET}
    printf '%s' "$(./ocm token)" > ${STEP_RESULTS_OCM_TOKEN_PATH}
    printf '%s' "$(./ocm token)" > ${RESULTS_OCM_TOKEN_PATH}
  provision-central.py: |
    #!/bin/env python
    import os
    import requests

    headers = {"Authorization": "Bearer " + os.getenv("OCM_TOKEN"), "Content-Type": "application/json"}
    existing_central_id = os.getenv("EXISTING_CENTRAL_ID")

    if existing_central_id:
      central_id = existing_central_id
      print(f"Using existing Central with ID {central_id}")
    else:
      cloud_account_id = os.getenv("CLOUD_ACCOUNT_ID")
      if not cloud_account_id:
        raise ValueError("CLOUD_ACCOUNT_ID must be set when creating a new Central")

      API_URL = "https://api.openshift.com/api/rhacs/v1/centrals?async=true"
      central_name_suffix = os.getenv("PIPELINERUN_UID").split("-")[0]
      central_name = f"vuln-scan-cert-{central_name_suffix}"
      payload = {
        "name": central_name,
        "cloud_provider": "aws",
        "multi_az": True,
        "region": os.getenv("CENTRAL_AWS_REGION"),
        "cloud_account_id": cloud_account_id,
      }

      print(f"Sending Central creation request with name {central_name}")

      response = requests.post(
        API_URL,
        json=payload,
        headers=headers,
      )

      if response.status_code != 200:
        print(f"Return code: {response.status_code}")
        print(response.json())
        response.raise_for_status()

      central_request = response.json()
      central_id = central_request.get("id")
      print("Central creation request successfully sent")
      print(f"Central ID: {central_id}")

    with open(os.getenv('STEP_RESULTS_CENTRAL_ID_PATH'), 'w') as f:
      f.write(central_id)
    with open(os.getenv('RESULTS_CENTRAL_ID_PATH'), 'w') as f:
      f.write(central_id)
  wait-for-central-ready.py: |
    #!/bin/env python
    import os
    import time
    import requests
    headers = {"Authorization": "Bearer " + os.getenv("OCM_TOKEN"), "Content-Type": "application/json"}
    central_request_status = None

    while central_request_status != "ready":
      print("Querying central status")
      response = requests.get(f"https://api.openshift.com/api/rhacs/v1/centrals/{os.getenv("CENTRAL_ID")}", headers=headers)
      central_request = response.json()
      print(central_request)
      central_request_status = central_request.get("status")

      if central_request_status != "ready":
        print("Central is not ready yet, retrying in 10 seconds...")
        time.sleep(10)

    print("Central is Ready")

    with open(os.getenv('RESULTS_ROX_ENDPOINT_PATH'), 'w') as f:
      f.write(central_request.get("centralUIURL"))
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authenticate-central-scripts
data:
  install-roxctl.sh: |
    #!/bin/sh
    arch="$(uname -m | sed "s/x86_64//")"; arch="${arch:+-$arch}"
    curl -L -f -o roxctl "https://mirror.openshift.com/pub/rhacs/assets/4.9.2/bin/Linux/roxctl${arch}"
    chmod +x roxctl
  authenticate-central.py: |
    #!/bin/env python
    import os
    import requests

    ROX_ENDPOINT = os.getenv("ROX_ENDPOINT")
    OCM_TOKEN = os.getenv("OCM_TOKEN")
    payload = { "idToken": OCM_TOKEN }
    response = requests.post(f"{ROX_ENDPOINT}/v1/auth/m2m/exchange", json=payload)

    if response.status_code != 200:
      print("Failed exchanching OIDC token. Machine to machine authentication may not be configured")
      response.raise_for_status()

    print("Token exchange successful")

    m2m_response = response.json()
    with open(os.getenv('STEP_RESULTS_ROX_API_TOKEN_PATH'), 'w') as f:
      f.write(m2m_response.get("accessToken"))
    with open(os.getenv('RESULTS_ROX_API_TOKEN_PATH'), 'w') as f:
      f.write(m2m_response.get("accessToken"))
  test-rox-api-token.sh: |
    #!/bin/sh
    ./roxctl central whoami
  create-rox-api-token-secret.sh: |
    #!/bin/sh
    set -eu
    ROX_API_TOKEN_SECRET_NAME="${ROX_API_TOKEN_SECRET_NAME_PARAM}"
    oc create secret generic "${ROX_API_TOKEN_SECRET_NAME}" \
      --namespace="${TASK_RUN_NAMESPACE}" \
      --from-literal=rox_api_token="${ROX_API_TOKEN}" \
      --dry-run=client -o yaml | oc apply -f -
    printf '%s' "${ROX_API_TOKEN_SECRET_NAME}" > "${STEP_RESULTS_ROX_API_TOKEN_SECRET_NAME_PATH}"
    printf '%s' "${ROX_API_TOKEN_SECRET_NAME}" > "${RESULTS_ROX_API_TOKEN_SECRET_NAME_PATH}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: destroy-central-scripts
data:
  install-ocm.sh: |
    #!/bin/sh
    # arch="$(uname -m | sed "s/x86_64//")"; arch="${arch:+-$arch}"
    curl -L -f -o ocm  https://github.com/openshift-online/ocm-cli/releases/download/v1.0.14/ocm-linux-amd64
    chmod +x ocm
    ./ocm version
  ocm-login.sh: |
    #!/bin/sh
    ./ocm login --client-id ${CLIENT_ID} --client-secret ${CLIENT_SECRET}
    printf '%s' "$(./ocm token)" > ${STEP_RESULTS_OCM_TOKEN_PATH}
  destroy-central.py: |
    #!/bin/env python
    import os
    import requests

    ocm_token = os.getenv("OCM_TOKEN")
    central_id = os.getenv("CENTRAL_ID")

    API_URL = f"https://api.openshift.com/api/rhacs/v1/centrals/{central_id}?async=true"
    headers = {"Authorization": "Bearer " + ocm_token, "Content-Type": "application/json"}

    print(f"Sending Central deletion request with id {central_id}")

    response = requests.delete(API_URL, headers=headers)

    if response.status_code != 200:
      print(f"Return code: {response.status_code}")
      response.raise_for_status()

    print("Central deletion request successfully sent")
  wait-for-central-delete.py: |
    #!/bin/env python
    import os
    import time
    import requests

    ocm_token = os.getenv("OCM_TOKEN")
    central_id = os.getenv("CENTRAL_ID")

    headers = {"Authorization": "Bearer " + ocm_token, "Content-Type": "application/json"}
    return_code = None

    while return_code != 404:
      print("Querying central status")
      response = requests.get(
          f"https://api.openshift.com/api/rhacs/v1/centrals/{central_id}",
          headers=headers,
      )
      central_request = response.json()
      print(central_request)
      central_status = central_request.get("status")
      return_code = response.status_code

      if return_code != 404:
        print(f"Central has status '{central_status}', retrying in 10 seconds...")
        time.sleep(10)

    print("Central is deleted")
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cleanup-rox-api-token-secret-scripts
data:
  delete-rox-api-token-secret.sh: |
    #!/bin/sh
    set -eu
    oc delete secret "${ROX_API_TOKEN_SECRET_NAME}" \
      --namespace="${TASK_RUN_NAMESPACE}" \
      --ignore-not-found=true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wait-for-scanner-init-scripts
data:
  wait-for-scanner-init.py: |
    #!/bin/env python
    import os
    import time
    import requests

    ROX_ENDPOINT = os.getenv("ROX_ENDPOINT")
    headers = {"Authorization": "Bearer " + os.getenv("ROX_API_TOKEN")}
    return_code = None

    while return_code != 200:
      response = requests.get(f"{ROX_ENDPOINT}/v1/integrationhealth/vulndefinitions?component=SCANNER_V4", headers=headers)
      return_code = response.status_code

      if return_code != 200:
        print("Scanner may not be ready. Retrying after 300s")
        time.sleep(300)

    scanner_health = response.json()

    print("Scanner v4 DB Initialized")
    print(scanner_health.get("lastUpdatedTimestamp"))
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rhacs-image-scan-scripts
data:
  scan-image.sh: |
    #!/bin/bash
    set -euo pipefail

    echo "Scanning image: ${IMAGE}"
    echo "ROX Central endpoint: ${ROX_ENDPOINT}"
    echo "API Token file: ${ROX_API_TOKEN_FILE}"

    # Create results directory
    mkdir -p "${RESULTS_PATH}"

    # Generate unique filename based on image name
    # Convert image name to safe filename: remove registry, replace special chars with hyphens
    IMAGE_SAFE=$(echo "${IMAGE}" | sed 's|.*/||; s|[^a-zA-Z0-9._-]|-|g' | sed 's|--*|-|g; s|^-||; s|-$||')
    echo "Image safe name: ${IMAGE_SAFE}"

    # Download roxctl binary from the working URL
    echo "Downloading roxctl binary..."
    ROXCTL_URL="https://mirror.openshift.com/pub/rhacs/assets/4.4.2/bin/Linux/roxctl"

    if curl -sL -f -o /tmp/roxctl "$ROXCTL_URL"; then
        chmod +x /tmp/roxctl
        if /tmp/roxctl version &>/dev/null; then
            ROXCTL_CMD="/tmp/roxctl"
            echo "Successfully downloaded roxctl from $ROXCTL_URL"
            /tmp/roxctl version
        else
            echo "ERROR: Downloaded file is not a valid roxctl binary"
            exit 1
        fi
    else
        echo "ERROR: Failed to download roxctl from $ROXCTL_URL"
        exit 1
    fi

    # Perform the image scan and save results to JSON file with unique name
    JSON_OUTPUT="${RESULTS_PATH}/scan-results-${IMAGE_SAFE}.json"

    echo "ROX API Token file: ${ROX_API_TOKEN_FILE}"
    if [ ! -f "${ROX_API_TOKEN_FILE}" ]; then
        echo "ERROR: ROX API token file not found at ${ROX_API_TOKEN_FILE}"
        echo "Available files in /workspace:"
        find /workspace -name "*token*" -o -name "rox*" 2>/dev/null || echo "No token files found"
        exit 1
    fi

    echo "Running scan command..."
    # Run the scan with JSON output
    $ROXCTL_CMD image scan \
      --insecure-skip-tls-verify=${INSECURE} \
      --output=json \
      --image="${IMAGE}" > "${JSON_OUTPUT}"

    echo "Scan completed successfully"
    echo "JSON results saved to: ${JSON_OUTPUT}"

    # Show first few lines of results for verification
    echo "Sample of scan results:"
    head -10 "${JSON_OUTPUT}"

  json-to-csv.py: |
    #!/usr/bin/env python3
    """
    Convert RHACS JSON vulnerability scan results to CSV format.
    Based on the json_to_csv.py script for compatibility with Analyzer tools.
    """
    import csv
    import json
    import os
    import sys
    from pathlib import Path

    def load_json_data(file_path):
        """Load and validate JSON data from file."""
        print(f"Loading JSON data from: {file_path}")

        try:
            with open(file_path, 'r', encoding='utf-8') as file:
                data = json.load(file)
        except json.JSONDecodeError as e:
            raise ValueError(f"Invalid JSON format in file {file_path}: {e}")
        except Exception as e:
            raise IOError(f"Error reading file {file_path}: {e}")

        return data

    def extract_vulnerability_data(scan_data, container_name, container_tag):
        """Extract vulnerability data from RHACS scan results."""
        print("Extracting vulnerability data...")

        csv_data = []

        # RHACS JSON structure may vary, handle multiple possible formats
        vulnerabilities = []

        # Try different possible JSON structures
        if isinstance(scan_data, dict):
            if 'scan' in scan_data and 'components' in scan_data['scan']:
                # Handle RHACS scan format with components
                for component in scan_data['scan']['components']:
                    if 'vulns' in component:
                        for vuln in component['vulns']:
                            # Add component info to vulnerability
                            vuln['componentName'] = component.get('name', '')
                            vuln['componentVersion'] = component.get('version', '')
                            vulnerabilities.append(vuln)
            elif 'result' in scan_data and 'vulnerabilities' in scan_data['result']:
                # Handle alternative format mentioned in the conversion script
                vulnerabilities = scan_data['result']['vulnerabilities']
            elif 'vulnerabilities' in scan_data:
                # Direct vulnerabilities array
                vulnerabilities = scan_data['vulnerabilities']
            elif 'results' in scan_data:
                # Handle results array format
                for result in scan_data['results']:
                    if 'vulnerabilities' in result:
                        vulnerabilities.extend(result['vulnerabilities'])

        print(f"Found {len(vulnerabilities)} vulnerabilities to process")

        for vuln in vulnerabilities:
            if not isinstance(vuln, dict):
                continue

            # Map RHACS fields to CSV fields with safe extraction
            # Handle various possible field names from RHACS
            csv_row = {
                'cve_id': str(vuln.get('cve', vuln.get('cveId', vuln.get('name', '')))),
                'package': str(vuln.get('componentName', vuln.get('component', {}).get('name', ''))),
                'package_ve': str(vuln.get('componentVersion', vuln.get('component', {}).get('version', ''))),
                'rh_severity': str(vuln.get('severity', vuln.get('cveSeverity', ''))).upper(),
                'rh_cvss': str(vuln.get('cvss', vuln.get('cveCVSS', vuln.get('scoreV3', '')))),
                'container': container_name,
                'container_tag': container_tag,
                'advisory': str(vuln.get('fixedBy', vuln.get('advisoryId', '')))
            }

            csv_data.append(csv_row)

        print(f"Extracted {len(csv_data)} vulnerability records")
        return csv_data

    def write_csv_data(csv_data, output_path):
        """Write vulnerability data to CSV file."""
        print(f"Writing CSV data to: {output_path}")

        if not csv_data:
            print("No vulnerability data to write")
            # Still create an empty CSV with headers
            csv_data = []

        # Define field order as specified in requirements
        fieldnames = [
            'cve_id',
            'package',
            'package_ve',
            'rh_severity',
            'rh_cvss',
            'container',
            'container_tag',
            'advisory'
        ]

        try:
            with open(output_path, 'w', newline='', encoding='utf-8') as csvfile:
                writer = csv.DictWriter(csvfile, fieldnames=fieldnames)

                # Write header row
                writer.writeheader()

                # Write data rows
                if csv_data:
                    writer.writerows(csv_data)

            print(f"Successfully wrote {len(csv_data)} records to {output_path}")

        except Exception as e:
            raise IOError(f"Error writing CSV file {output_path}: {e}")

    def main():
        """Main conversion function."""
        try:
            # Get input parameters
            image = os.environ.get('IMAGE', '')
            results_path = os.environ.get('RESULTS_PATH', '/workspace/results')

            # Generate same unique filename as used in scan script
            import re
            image_safe = re.sub(r'.*/','', image)  # Remove registry
            image_safe = re.sub(r'[^a-zA-Z0-9._-]', '-', image_safe)  # Replace special chars
            image_safe = re.sub(r'-+', '-', image_safe)  # Collapse multiple hyphens
            image_safe = image_safe.strip('-')  # Remove leading/trailing hyphens

            json_file = f'{results_path}/scan-results-{image_safe}.json'
            csv_file = f'{results_path}/scan-results-{image_safe}.csv'

            # Parse container name and tag from image
            if ':' in image:
                container_name, container_tag = image.rsplit(':', 1)
            else:
                container_name = image
                container_tag = 'latest'

            # Remove registry prefix for cleaner container name
            if '/' in container_name:
                container_name = container_name.split('/')[-1]

            print(f"Processing image: {image}")
            print(f"Container: {container_name}:{container_tag}")

            # Check if JSON file exists
            if not os.path.exists(json_file):
                print(f"ERROR: JSON file not found: {json_file}")
                sys.exit(1)

            # Load JSON data
            scan_data = load_json_data(json_file)

            # Extract vulnerability data
            csv_data = extract_vulnerability_data(scan_data, container_name, container_tag)

            # Write CSV output
            write_csv_data(csv_data, csv_file)

            print(f"Successfully converted {len(csv_data)} vulnerabilities from {json_file} to {csv_file}")

            # Show sample CSV for verification
            if csv_data:
                print("Sample CSV output:")
                with open(csv_file, 'r') as f:
                    lines = f.readlines()
                    for i, line in enumerate(lines[:5]):  # Show first 5 lines
                        print(f"{i+1}: {line.strip()}")

        except Exception as e:
            print(f"Conversion failed: {e}")
            import traceback
            traceback.print_exc()
            sys.exit(1)

    if __name__ == '__main__':
        main()