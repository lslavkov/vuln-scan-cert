apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: wait-for-scanner-init
spec:
  params:
    - name: rox-endpoint
      type: string
      description: Central UI Endpoint
    - name: rox-api-token
      type: string
  stepTemplate:
    computeResources: {}
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
  steps:
    - image: image-registry.openshift-image-registry.svc:5000/default/python3-with-requests:latest
      name: wait-for-scanner-init
      results:
        - name: rox-api-token
          type: string
      command:
        - python
        - /scripts/wait-for-scanner-init.py
      volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      env:
        - name: ROX_ENDPOINT
          value: $(params.rox-endpoint)
        - name: ROX_API_TOKEN
          value: $(params.rox-api-token)
  volumes:
    - name: scripts
      configMap:
        name: wait-for-scanner-init-scripts
        defaultMode: 0755
